<!doctype html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifikasi Toast - Demo</title>

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

    <style>
        body {
            background-color: #f4f4f4;
        }

        .container-box {
            background: white;
            padding: 30px;
            margin-top: 50px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .toast {
            position: absolute;
            top: 20px;
            right: 20px;
            min-width: 250px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="container-box text-center">
        <h3 class="mb-3">PopNotify</h3>
        <p>Klik tombol untuk menampilkan notifikasi.</p>

        <button class="btn btn-success m-1" id="btn-sukses">Success</button>
        <button class="btn btn-danger m-1" id="btn-error">Error</button>
    </div>

    <!-- TOAST -->
    <div class="toast" id="myToast" data-delay="3000">
        <div class="toast-header">
            <strong class="mr-auto" id="toast-title">Notifikasi</strong>
            <small>Baru saja</small>
            <button type="button" class="ml-2 mb-1 close" data-dismiss="toast">&times;</button>
        </div>
        <div class="toast-body" id="toast-body">
            Ini isi notifikasi
        </div>
    </div>

    <!-- LOG -->
    <div class="alert alert-secondary mt-4 text-center" id="log">
        <em>Menunggu aksi pengguna...</em>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>

<script>
    $(document).ready(function(){

        // --- FUNCTION TOAST ---
        function tampilkanToast(judul, isi, tipe) {

            $('#toast-title').text(judul);
            $('#toast-body').text(isi);

            // Ganti warna header
            $('.toast-header').removeClass('bg-success bg-danger text-white');

            if(tipe === 'sukses'){
                $('.toast-header').addClass('bg-success text-white');
            } else if(tipe === 'error'){
                $('.toast-header').addClass('bg-danger text-white');
            }

            $('#myToast').toast('show');
        }

        // --- BUTTON EVENTS ---
        $('#btn-sukses').click(function(){
            tampilkanToast('Berhasil', 'Data berhasil disimpan!', 'sukses');
        });

        $('#btn-error').click(function(){
            tampilkanToast('Gagal', 'Terjadi kesalahan sistem!', 'error');
        });

        // --- EVENT SAAT TOAST MUNCUL ---
        $('#myToast').on('shown.bs.toast', function () {
            $('#log')
                .removeClass('alert-secondary')
                .addClass('alert-success')
                .html('<strong>Sistem:</strong> Notifikasi berhasil ditampilkan.');
        });

        // --- AUTO TOAST SAAT LOAD ---
        setTimeout(function(){
            tampilkanToast('Selamat Datang', 'Halaman berhasil dimuat.', 'sukses');
        }, 1000);

    });
</script>

</body>
</html>
